    <script>
      (function() {
        try {
          // 1. Dark mode
          const theme = localStorage.getItem('theme_admin') || 'light';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
          
          // 2. Admin colors
          const adminPrimary = localStorage.getItem('admin_primary_color');
          if (adminPrimary) {
            const toHSL = (hex) => {
              const r = parseInt(hex.slice(1, 3), 16) / 255;
              const g = parseInt(hex.slice(3, 5), 16) / 255;
              const b = parseInt(hex.slice(5, 7), 16) / 255;
              const max = Math.max(r, g, b), min = Math.min(r, g, b);
              let h = 0, s = 0;
              const l = (max + min) / 2;
              if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                  case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                  case g: h = ((b - r) / d + 2) / 6; break;
                  case b: h = ((r - g) / d + 4) / 6; break;
                }
              }
              return `${Math.round(h * 360)} ${Math.round(s * 100)}% ${Math.round(l * 100)}%`;
            };
            const hsl = toHSL(adminPrimary);
            document.documentElement.style.setProperty('--primary', hsl);
            document.documentElement.style.setProperty('--ring', hsl);
            document.documentElement.style.setProperty('--sidebar-primary', hsl);
            document.documentElement.style.setProperty('--sidebar-ring', hsl);
            document.documentElement.style.setProperty('--accent-foreground', hsl);
          }
        } catch (e) {}
      })();
    </script>
